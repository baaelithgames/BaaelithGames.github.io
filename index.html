<html lang="en">

<title>Baaelith Games</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--black:#07060A;--blood:#8B0000;--blood-bright:#C0392B;--gold:#C9A84C;--gold-dim:rgba(201,168,76,0.4);--paper:#F0E6D0;--paper-dim:rgba(240,230,208,0.6);--paper-ghost:rgba(240,230,208,0.15);--mist:rgba(240,230,208,0.35);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--paper);font-family:'Cormorant Garamond',Georgia,serif;overflow-x:hidden;cursor:crosshair;}
a,button{cursor:pointer;}
.lang-bar{position:fixed;top:0;right:0;z-index:200;display:flex;align-items:center;padding:1rem 1.5rem;gap:4px;}
.lang-btn{background:none;border:none;font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:var(--mist);padding:4px 8px;transition:color 0.2s;text-transform:uppercase;}
.lang-btn.active{color:var(--gold);}
.lang-sep{color:var(--mist);font-size:10px;opacity:0.4;}
.particles{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
.particle{position:absolute;width:1px;height:1px;background:var(--gold);border-radius:50%;animation:drift linear infinite;opacity:0;}
@keyframes drift{0%{transform:translateY(100vh);opacity:0;}10%{opacity:0.5;}90%{opacity:0.2;}100%{transform:translateY(-10vh) translateX(20px);opacity:0;}}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:5rem 2rem 4rem;text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,transparent 30%,rgba(7,6,10,0.8) 100%),radial-gradient(ellipse 100% 50% at 50% 0%,rgba(139,0,0,0.12) 0%,transparent 60%);pointer-events:none;z-index:1;}
.hero-content{position:relative;z-index:2;max-width:800px;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.hero-eyebrow{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.5em;color:var(--gold);text-transform:uppercase;margin-bottom:2rem;opacity:0;animation:fadeDown 1s ease 0.3s forwards;}
.hero-logo{font-family:'Cinzel',serif;font-size:clamp(2.5rem,8vw,5.5rem);font-weight:900;letter-spacing:0.15em;color:var(--paper);line-height:1;margin-bottom:0.5rem;text-shadow:0 0 80px rgba(139,0,0,0.3);opacity:0;animation:fadeUp 1.2s ease 0.5s forwards;}
.hero-logo span{color:var(--blood-bright);}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:3rem;opacity:0;animation:fadeUp 1s ease 0.8s forwards;}
.hero-rule::before,.hero-rule::after{content:'';width:40px;height:1px;background:var(--gold-dim);}
.hero-tagline{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.3em;color:var(--mist);text-transform:uppercase;}
.hero-desc{font-size:clamp(1.1rem,2.5vw,1.4rem);font-style:italic;font-weight:300;color:var(--paper-dim);line-height:1.8;max-width:560px;margin:0 auto 3.5rem;opacity:0;animation:fadeUp 1s ease 1s forwards;}
.hero-cta{display:flex;gap:1.25rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp 1s ease 1.2s forwards;}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 1s ease 2s forwards;}
.hero-scroll span{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.3em;color:var(--mist);text-transform:uppercase;}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold-dim),transparent);animation:scrollPulse 2s ease-in-out infinite;}
@keyframes scrollPulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
.btn-primary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--paper);background:var(--blood);border:1px solid var(--blood-bright);padding:14px 32px;text-decoration:none;transition:background 0.3s;display:inline-block;}
.btn-primary:hover{background:var(--blood-bright);}
.btn-secondary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--paper-dim);background:transparent;border:1px solid rgba(240,230,208,0.2);padding:14px 32px;text-decoration:none;transition:all 0.3s;display:inline-block;}
.btn-secondary:hover{border-color:var(--gold-dim);color:var(--gold);}
.inv-banner{background:rgba(139,0,0,0.08);border-top:1px solid rgba(139,0,0,0.2);border-bottom:1px solid rgba(139,0,0,0.2);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap;position:relative;z-index:2;}
.inv-banner p{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:var(--paper-dim);text-transform:uppercase;}
.inv-banner a{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:var(--blood-bright);text-decoration:none;text-transform:uppercase;border-bottom:1px solid rgba(192,57,43,0.3);}
.inv-banner a:hover{border-color:var(--blood-bright);}
.game-section{padding:7rem 2rem;position:relative;z-index:2;}
.game-section::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,0,0,0.06) 0%,transparent 50%);pointer-events:none;}
.game-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.game-label{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.4em;color:var(--blood-bright);text-transform:uppercase;margin-bottom:1rem;}
.game-title{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:var(--paper);line-height:1.1;margin-bottom:0.5rem;}
.game-subtitle{font-family:'Cinzel',serif;font-size:clamp(1rem,2vw,1.3rem);font-weight:400;color:var(--gold);letter-spacing:0.1em;margin-bottom:2rem;}
.game-desc{font-size:1.15rem;font-weight:300;line-height:1.9;color:var(--paper-dim);margin-bottom:2.5rem;}
.game-tags{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:2.5rem;}
.tag{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border:1px solid rgba(240,230,208,0.12);color:var(--mist);}
.game-cta{display:flex;gap:1rem;flex-wrap:wrap;}
.parchment-frame{border:1px solid rgba(201,168,76,0.2);overflow:hidden;position:relative;}
.parchment-frame::before{content:'';position:absolute;inset:8px;border:1px solid rgba(139,0,0,0.2);z-index:1;pointer-events:none;}
.parchment-frame img{width:100%;display:block;filter:sepia(0.2) contrast(1.05);transition:filter 0.4s;}
.parchment-frame:hover img{filter:sepia(0) contrast(1.1);}
.parchment-caption{padding:1rem;background:rgba(240,230,208,0.03);border-top:1px solid rgba(240,230,208,0.06);display:flex;justify-content:space-between;align-items:center;}
.parchment-caption p{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.15em;color:var(--mist);text-transform:uppercase;}
.parchment-status{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--blood-bright);background:rgba(139,0,0,0.15);padding:3px 10px;animation:blink 3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.divider{border:none;border-top:1px solid rgba(240,230,208,0.06);max-width:1100px;margin:0 auto;}
.studio-section{max-width:1100px;margin:0 auto;padding:6rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start;position:relative;z-index:2;}
.section-label{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;}
.section-label::after{content:'';width:60px;height:1px;background:var(--gold-dim);}
.studio-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:600;color:var(--paper);line-height:1.2;margin-bottom:1.5rem;}
.studio-text{font-size:1.1rem;font-weight:300;line-height:1.9;color:var(--paper-dim);margin-bottom:1.25rem;}
.studio-manifesto{border-left:2px solid var(--blood);padding:1rem 1.5rem;background:rgba(139,0,0,0.05);margin-top:2rem;}
.studio-manifesto p{font-size:1.05rem;font-style:italic;color:var(--paper-dim);line-height:1.8;}
.studio-facts{display:flex;flex-direction:column;gap:1.5rem;padding-top:1rem;}
.fact-item{padding-bottom:1.5rem;border-bottom:1px solid rgba(240,230,208,0.06);}
.fact-item:last-child{border-bottom:none;}
.fact-num{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;color:var(--blood-bright);line-height:1;margin-bottom:0.25rem;}
.fact-label{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:0.4rem;}
.fact-desc{font-size:0.95rem;color:var(--mist);font-style:italic;line-height:1.6;}
.social-section{padding:5rem 2rem 6rem;max-width:1100px;margin:0 auto;text-align:center;position:relative;z-index:2;}
.social-title{font-family:'Cinzel',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:600;color:var(--paper);margin-bottom:0.75rem;}
.social-sub{font-size:1rem;font-style:italic;color:var(--mist);margin-bottom:3rem;}
.social-links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;}
.social-link{display:flex;flex-direction:column;align-items:center;gap:0.75rem;text-decoration:none;padding:1.75rem 2rem;border:1px solid rgba(240,230,208,0.08);background:rgba(240,230,208,0.02);min-width:140px;transition:all 0.3s;position:relative;overflow:hidden;}
.social-link::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blood);transform:scaleX(0);transition:transform 0.3s;}
.social-link:hover{border-color:rgba(240,230,208,0.15);}
.social-link:hover::before{transform:scaleX(1);}
.social-icon{font-size:1.5rem;display:block;}
.social-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;color:var(--paper-dim);text-transform:uppercase;}
.social-handle{font-family:'Courier Prime',monospace;font-size:10px;color:var(--mist);letter-spacing:0.05em;}
footer{border-top:1px solid rgba(240,230,208,0.06);padding:2.5rem 2rem;text-align:center;position:relative;z-index:2;}
footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(to right,transparent,var(--blood-bright),transparent);opacity:0.4;}
.footer-logo{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:0.3em;color:var(--paper-ghost);margin-bottom:0.5rem;}
.footer-blood{display:block;color:var(--blood);margin:0.75rem auto;font-size:1rem;opacity:0.5;}
.footer-copy{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;color:rgba(240,230,208,0.15);text-transform:uppercase;margin-bottom:0.75rem;}
.footer-email a{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:rgba(240,230,208,0.25);text-decoration:none;text-transform:uppercase;border-bottom:1px solid rgba(240,230,208,0.1);transition:color 0.2s;}
.footer-email a:hover{color:var(--gold);}
@media(max-width:768px){.game-inner{grid-template-columns:1fr;gap:3rem;}.game-visual{order:-1;}.studio-section{grid-template-columns:1fr;gap:3rem;}}
@media(max-width:480px){.hero-cta{flex-direction:column;align-items:center;}.btn-primary,.btn-secondary{width:100%;text-align:center;}}
</style>
</head>

    'social-steam': 'Wishlist maintenant',
    'social-ks': 'Soutenir le projet',
    'footer-copy': '2026 Baaelith Games - Tous droits reserves - Studio Independant Suisse'
  }
};

function setLang(l) {
  var d = T[l];
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-fr').classList.toggle('active', l === 'fr');
  document.documentElement.lang = l;
  for (var key in d) {
    var el = document.getElementById('t-' + key);
    if (el) el.textContent = d[key];
  }
}

var container = document.getElementById('particles');
for (var i = 0; i < 25; i++) {
  var p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
  p.style.animationDuration = (Math.random() * 15 + 10) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  container.appendChild(p);
}

document.querySelectorAll('a[href^="#"]').forEach(function(a) {
  a.addEventListener('click', function(e) {
    var target = document.querySelector(a.getAttribute('href'));
    if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
  });
});

setLang('en');
</script>
